<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Bryan Imports</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <header class="topo-admin">
    <div class="container topo-admin-conteudo">
      <h1>Painel Admin</h1>

      <div class="topo-botoes">
        <button class="btn-secundario" onclick="irParaLoja()">Ver Loja</button>
        <button class="btn-perigo" onclick="logout()">Sair</button>
      </div>
    </div>
  </header>

  <main class="container admin-layout">
    <section class="card">
      <h2>Cadastro de Produto</h2>

      <form id="produto-form" class="grid-form">
        <input type="hidden" id="produto-id" />

        <div>
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Nome do produto" required />
        </div>

        <div>
          <label for="categoria">Categoria</label>
          <input type="text" id="categoria" placeholder="Categoria" required />
        </div>

        <div class="full">
          <label for="descricao">Descrição</label>
          <textarea id="descricao" placeholder="Descrição do produto"></textarea>
        </div>

        <div>
          <label for="preco">Preço</label>
          <input type="number" id="preco" placeholder="Preço" step="0.01" required />
        </div>

        <div>
          <label for="estoque">Estoque</label>
          <input type="number" id="estoque" placeholder="Estoque" min="0" required />
        </div>

        <div class="full">
          <label for="imagem">URL da imagem</label>
          <input type="text" id="imagem" placeholder="Cole a URL da imagem" />
        </div>

        <div class="full preview-area">
          <img id="preview-imagem" src="" alt="Preview" class="preview-img oculto" />
        </div>

        <div class="full acoes-form">
          <button type="submit" class="btn-primario" id="btn-salvar-produto">Salvar Produto</button>
          <button type="button" class="btn-secundario" id="btn-cancelar-edicao">Cancelar Edição</button>
        </div>
      </form>

      <p id="produto-msg" class="mensagem"></p>
    </section>

    <section class="card">
      <div class="card-topo">
        <h2>Produtos Cadastrados</h2>
        <button class="btn-secundario" onclick="carregarProdutos()">Atualizar</button>
      </div>

      <div class="tabela-responsiva">
        <table>
          <thead>
            <tr>
              <th>Imagem</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-produtos"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Criar Cliente</h2>

      <form id="cliente-form" class="grid-form">
        <div>
          <label for="cliente-nome">Nome</label>
          <input type="text" id="cliente-nome" placeholder="Nome do cliente" required />
        </div>

        <div>
          <label for="cliente-email">E-mail</label>
          <input type="email" id="cliente-email" placeholder="E-mail do cliente" required />
        </div>

        <div>
          <label for="cliente-senha">Senha</label>
          <input type="password" id="cliente-senha" placeholder="Senha" required />
        </div>

        <div class="full acoes-form">
          <button type="submit" class="btn-primario">Criar Cliente</button>
        </div>
      </form>

      <p id="cliente-msg" class="mensagem"></p>
    </section>

    <section class="card">
      <div class="card-topo">
        <h2>Clientes</h2>
        <button class="btn-secundario" onclick="carregarClientes()">Atualizar</button>
      </div>

      <div class="tabela-responsiva">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Tipo</th>
            </tr>
          </thead>
          <tbody id="tabela-clientes"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
